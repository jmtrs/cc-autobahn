name: CI

# Runs once per pull request targeting main/develop (or by manual dispatch).
# Branch protection requires both jobs before merge; post-merge pushes do not
# rerun the exact same tree. Superseded commits in one PR cancel their old run.
# Two parallel jobs:
#  - check-macos: backend tests, clippy (-D warnings), fmt --check, frontend
#    + visual regression (Playwright baselines are pixel-compared against
#    macOS WebKit — see D58 for why visual stays macOS-only on CI).
#  - check-linux: fmt --check, clippy, backend tests, Vite build, Linux bundles,
#    frontend logic tests (node --test, cross-platform). No visual regression
#    (Playwright baselines are pixel-compared against macOS WebKit — D58).
#    This job is the proof the macOS cfg gating compiles clean on Linux (D54).

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx playwright install chromium
      - run: npm run test:frontend
      - run: npm run test:visual
      - run: npm run build

      - name: cargo fmt --check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

  check-linux:
    # noble (24.04), not jammy (D65): jammy-updates' libwebkit2gtk-4.1 is
    # 2.50.4, which hits an upstream EGL_BAD_PARAMETER regression on some
    # older Intel/Mesa combos (WebKit bug #280239). noble ships 2.52.3,
    # confirmed working on the same hardware that reproduced the crash.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev \
            libssl-dev file curl wget unzip rpm appstream desktop-file-utils

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run test:frontend

      - name: cargo fmt --check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build Linux bundles
        run: npm run tauri build -- --bundles deb,rpm,appimage

      - name: Validate Linux bundles and metadata
        run: bash scripts/validate-linux-bundles.sh
