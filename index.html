<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cc-autobahn</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="cluster">
      <div class="screen">
        <div class="display">
          <!-- Top band: model nameplate badge (editable) + "SINCE START" caption -->
          <div class="row header">
            <span class="nameplate" id="nameplate"></span>
            <span class="header-right">
              <span class="label">SINCE START</span>
              <button class="pin-btn" id="pin-btn" title="Pin panel (don't close on blur)">PIN</button>
            </span>
          </div>

          <!-- Main readout grid -->
          <div class="grid">
            <div class="cell">
              <span class="big" id="odo">1.24M</span>
              <span class="unit">tok</span>
            </div>
            <div class="cell">
              <span class="big" id="session-time">0:40</span>
              <span class="unit">h</span>
            </div>

            <div class="cell">
              <span class="big" id="burn">4.1k</span>
              <span class="unit">tok/s</span>
            </div>
            <div class="cell">
              <span class="big" id="avg">$0.42</span>
              <span class="unit">/Mtok</span>
            </div>
          </div>

          <!-- Bottom line: pace/autonomy toggle + clock, like "106 Km/h   16:57" (D8) -->
          <div class="row footer">
            <span class="ghost footer-metric" id="footer-metric" title="Click to switch">
              <span class="ghost-label" id="footer-metric-label">PACE</span>
              <span id="footer-metric-value">—</span>
            </span>
            <span class="clock" id="clock">--:--</span>
          </div>

          <!-- Autonomie segment bar (5h window), like the coolant gauge -->
          <div class="row gauge">
            <svg class="fuel" viewBox="0 0 12 16" aria-hidden="true">
              <rect class="fuel-body" x="1.5" y="4" width="6" height="10" rx="1" />
              <rect class="fuel-window" x="3" y="6.2" width="3" height="2.6" />
              <path class="fuel-hose" d="M7 5.5 C8.5 4.3 10.5 5 10.5 7 C10.5 9 8.7 8.8 8.2 10.3 C7.9 11.2 8.6 11.6 9.3 11.2" />
            </svg>
            <div class="segments" id="segments" aria-label="5h window autonomy">
              <!-- segments injected by JS -->
            </div>
            <span class="autonomie" id="autonomie">3h12</span>
          </div>

          <!-- CHECK ENGINE overlay (shown while no ccusage/npx/bunx on PATH, D9/Phase 4) -->
          <div class="sensor-overlay engine-overlay" id="engine-overlay" hidden>
            <div class="sensor-card">
              <div class="sensor-title">CHECK ENGINE</div>
              <div class="sensor-body" id="engine-body"></div>
              <div class="sensor-actions">
                <button class="sensor-btn" id="engine-install-btn">Install engine</button>
              </div>
            </div>
          </div>

          <!-- Sensor statusLine connect overlay (shown until the sensor is installed) -->
          <div class="sensor-overlay" id="sensor-overlay" hidden>
            <div class="sensor-card">
              <div class="sensor-title">SENSOR STATUSLINE</div>
              <div class="sensor-body" id="sensor-body"></div>
              <div class="sensor-actions">
                <button class="sensor-btn ghost" id="sensor-cancel" hidden>Cancel</button>
                <button class="sensor-btn ghost" id="sensor-disconnect" hidden>Disconnect</button>
                <button class="sensor-btn" id="sensor-connect">Connect</button>
              </div>
            </div>
          </div>
        </div>

        <!-- PRND-style selector: active model lit, rest dimmed, integrated into the screen -->
        <div class="gear" id="gear">
          <span class="gear-marker" id="gear-marker" aria-hidden="true"></span>
          <span class="g active" data-model="opus">O</span>
          <span class="g" data-model="sonnet">S</span>
          <span class="g" data-model="haiku">H</span>
          <span class="g" data-model="fable">F</span>
        </div>
      </div>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
