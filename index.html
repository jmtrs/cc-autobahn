<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cc-autobahn</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="cluster" data-tauri-drag-region>
      <div class="screen">
        <div class="display">
          <!-- Top band: model nameplate badge (editable), header-hint (what's under
               the cursor, replaces native title tooltips, D-review), page label + MFD/PIN. -->
          <div class="row header">
            <span class="nameplate" id="nameplate" data-no-drag></span>
            <span class="header-hint" id="header-hint"></span>
            <span class="header-right">
              <span class="label" id="page-label">SINCE START</span>
              <button class="mfd-btn" id="mfd-btn">&#9656;</button>
              <button class="pin-btn" id="pin-btn">PIN</button>
            </span>
          </div>

          <!-- MFD pages (D-review: real trip computers cycle screens with a
               stalk button instead of cramming everything into one readout).
               Page 0 is the untouched original trip computer. -->
          <div class="pages" id="pages">
            <!-- Page 0: live trip computer (default) -->
            <div class="page active" data-page="0" id="page-0">
              <div class="grid">
                <div class="cell">
                  <span class="big" id="odo">1.24M</span>
                  <span class="unit">tok</span>
                </div>
                <div class="cell">
                  <span class="big" id="session-time">0:40</span>
                  <span class="unit">h</span>
                </div>

                <div class="cell">
                  <span class="big" id="burn">4.1k</span>
                  <span class="unit">tok/s</span>
                </div>
                <!-- PACE/AUTO promoted to a primary grid cell (D-review: was a
                     small footer ghost line, lost against the other 3 big
                     readouts) — same ids/click-toggle, just relocated. -->
                <div class="cell footer-metric" id="footer-metric">
                  <span class="big" id="footer-metric-value">—</span>
                  <span class="unit" id="footer-metric-label">PACE</span>
                </div>
              </div>

              <!-- Bottom line: avg cost (demoted, D-review) + clock, like "106 Km/h   16:57" (D8) -->
              <div class="row footer">
                <span class="ghost" id="avg-metric">
                  <span class="ghost-label">AVG</span>
                  <span id="avg">$0.42</span><span class="unit">/Mtok</span>
                </span>
                <span class="clock" id="clock">--:--</span>
              </div>

              <!-- Autonomie segment bar (5h window), like the coolant gauge -->
              <div class="row gauge">
                <svg class="fuel" viewBox="0 0 12 16" aria-hidden="true">
                  <rect class="fuel-body" x="1.5" y="4" width="6" height="10" rx="1" />
                  <rect class="fuel-window" x="3" y="6.2" width="3" height="2.6" />
                  <path class="fuel-hose" d="M7 5.5 C8.5 4.3 10.5 5 10.5 7 C10.5 9 8.7 8.8 8.2 10.3 C7.9 11.2 8.6 11.6 9.3 11.2" />
                </svg>
                <div class="segments" id="segments" aria-label="5h quota remaining">
                  <!-- segments injected by JS -->
                </div>
                <span class="autonomie" id="autonomie">3h12</span>
              </div>
            </div>

            <!-- Page 1: history (Phase 6) — `ccusage claude daily`, last 30 days -->
            <div class="page" data-page="1" id="page-1">
              <div class="row header-sub">
                <span class="label">LAST 30 DAYS</span>
                <span class="big small-total" id="history-total">—</span>
              </div>
              <div class="history-bars" id="history-bars"></div>

              <!-- Fixed detail readout (D-review: a floating tooltip always clips against
                   this window's real size, 440x150 — a docked panel can't overflow).
                   Hover a bar to fill it; defaults to the latest day. -->
              <div class="history-detail" id="history-detail">
                <div class="hd-row">
                  <span id="hd-date">—</span>
                  <span id="hd-total">—</span>
                </div>
                <div class="hd-models" id="hd-models"></div>
              </div>
            </div>

            <!-- Page 2: official weekly limit + today's per-model cost + instant/avg burn.
                 Two columns (D-review): the window is 440x150 — wide and short — so a
                 single vertical stack left the model list with ~2 visible rows. -->
            <div class="page" data-page="2" id="page-2">
              <div class="limits-cols">
                <div class="limits-col">
                  <div class="row header-sub">
                    <span class="label">WEEKLY LIMIT</span>
                    <span class="big small-total" id="limit-pct">—</span>
                  </div>
                  <div class="segments" id="limit-bar" aria-label="7d rate-limit window"></div>
                  <div class="row footer">
                    <span class="ghost" id="limit-reset">—</span>
                  </div>
                </div>

                <div class="limits-col">
                  <div class="row header-sub">
                    <span class="label">TODAY BY MODEL</span>
                  </div>
                  <div class="breakdown-list" id="breakdown-list"></div>
                </div>
              </div>

              <!-- Full-width footer: label above the value in each group;
                   INSTANT hugs the left edge, AVG the right one -->
              <div class="row footer burn-rates">
                <span class="burn-group"><span class="ghost-label">INSTANT</span> <span id="burn-instant">—</span></span>
                <span class="burn-group burn-right"><span class="ghost-label">AVG</span> <span id="burn-avg">—</span></span>
              </div>
            </div>

            <!-- Page 3: MFD settings — front-end only, localStorage.
                 Two columns (same trick as Page 2's .limits-cols): the window
                 is 440x150, wide and short, so a single vertical stack ran out
                 of height once THEME was added below SHOW SCREENS. -->
            <div class="page" data-page="3" id="page-3">
              <div class="settings-cols">
                <div class="settings-col">
                  <div class="row header-sub"><span class="label">DEFAULT SCREEN</span></div>
                  <!-- Custom dropdown, not a native <select>: WKWebView renders the
                       popup list as native OS chrome (the stray blue focus ring,
                       D-review) which CSS can't reach. -->
                  <div class="vfd-dropdown" id="default-page-dropdown">
                    <button type="button" class="vfd-dropdown-btn" id="default-page-btn">
                      <span id="default-page-value">SINCE START</span>
                      <span class="vfd-dropdown-arrow">&#9662;</span>
                    </button>
                    <ul class="vfd-dropdown-list" id="default-page-list" hidden>
                      <li data-value="0">SINCE START</li>
                      <li data-value="1">HISTORY</li>
                      <li data-value="2">LIMITS</li>
                    </ul>
                  </div>

                  <div class="row header-sub"><span class="label">SHOW SCREENS</span></div>
                  <!-- Rows built by settings-page.js (renderScreenList), ordered
                       per screenOrder — up/down buttons reorder the MFD cycle. -->
                  <div id="screen-order-list"></div>
                </div>

                <div class="settings-col">
                  <div class="row header-sub"><span class="label">THEME</span></div>
                  <!-- List items rendered by settings-page.js from theme.js's
                       PRESETS (single source of truth) + a CUSTOM entry. -->
                  <div class="vfd-dropdown" id="theme-dropdown">
                    <button type="button" class="vfd-dropdown-btn" id="theme-btn">
                      <span id="theme-value">AMBER</span>
                      <span class="vfd-dropdown-arrow">&#9662;</span>
                    </button>
                    <ul class="vfd-dropdown-list" id="theme-list" hidden></ul>
                  </div>
                  <!-- Only shown when CUSTOM is active — theme.js derives dim/glow/bg/bezel
                       from this one accent color. -->
                  <div class="row vfd-theme-accent" id="theme-accent-row" hidden>
                    <span class="label">ACCENT COLOR</span>
                    <input type="color" id="theme-accent-input" />
                  </div>

                  <!-- D41: undoes a manual drag (click-and-drag anywhere,
                       window-drag.js) without needing the tray's right-click menu. -->
                  <div class="row header-sub"><span class="label">WINDOW</span></div>
                  <button type="button" class="sensor-btn" id="reset-position-btn">Reset position</button>
                </div>
              </div>
            </div>
          </div>

          <!-- CHECK ENGINE overlay (shown while no ccusage/npx/bunx on PATH, D9/Phase 4) -->
          <div class="sensor-overlay engine-overlay" id="engine-overlay" hidden>
            <div class="sensor-card">
              <div class="sensor-title">CHECK ENGINE</div>
              <div class="sensor-body" id="engine-body"></div>
              <div class="sensor-actions">
                <div class="engine-spinner" id="engine-spinner" hidden>
                  <span class="engine-spinner-seg"></span>
                  <span class="engine-spinner-seg"></span>
                  <span class="engine-spinner-seg"></span>
                  <span class="engine-spinner-seg"></span>
                  <span class="engine-spinner-seg"></span>
                </div>
                <button class="sensor-btn" id="engine-install-btn">Install engine</button>
              </div>
            </div>
          </div>

          <!-- Sensor statusLine connect overlay (shown until the sensor is installed) -->
          <div class="sensor-overlay" id="sensor-overlay" hidden>
            <div class="sensor-card">
              <div class="sensor-title">SENSOR STATUSLINE</div>
              <div class="sensor-body" id="sensor-body"></div>
              <div class="sensor-actions">
                <button class="sensor-btn ghost" id="sensor-cancel" hidden>Cancel</button>
                <button class="sensor-btn ghost" id="sensor-disconnect" hidden>Disconnect</button>
                <button class="sensor-btn" id="sensor-connect">Connect</button>
              </div>
            </div>
          </div>
        </div>

        <!-- PRND-style selector: active model lit, rest dimmed, integrated into the screen -->
        <div class="gear" id="gear">
          <span class="gear-marker" id="gear-marker" aria-hidden="true"></span>
          <span class="g active" data-model="opus">O</span>
          <span class="g" data-model="sonnet">S</span>
          <span class="g" data-model="haiku">H</span>
          <span class="g" data-model="fable">F</span>
          <span class="g" data-model="custom">C</span>
        </div>
      </div>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
